# Deploy Granicus engine to Cloud Run via Workload Identity Federation

name: Deploy Granicus

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - prod
      skip_infra:
        description: Skip infrastructure provisioning
        required: false
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'datadecode-platform' }}
  CLOUD_RUN_REGION: ${{ vars.CLOUD_RUN_REGION || 'us-central1' }}
  ARTIFACT_REGISTRY_REPO: ${{ vars.ARTIFACT_REGISTRY_REPO || 'granicus' }}
  SERVICE: granicus-engine

jobs:
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image tag
        id: vars
        run: |
          REGISTRY="${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}"
          echo "image_tag=${REGISTRY}/engine:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.vars.outputs.image_tag }} \
            -t ${{ steps.vars.outputs.registry }}/engine:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ steps.vars.outputs.image_tag }}
          docker push ${{ steps.vars.outputs.registry }}/engine:latest

  provision:
    name: Provision infrastructure
    runs-on: ubuntu-latest
    if: ${{ inputs.skip_infra == false }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Enable APIs
        run: |
          gcloud services enable \
            firestore.googleapis.com \
            pubsub.googleapis.com \
            cloudscheduler.googleapis.com \
            --project=${{ env.GCP_PROJECT_ID }}

      - name: Provision Firestore
        run: bash deploy/setup-firestore.sh
        env:
          GCP_PROJECT: ${{ env.GCP_PROJECT_ID }}

      - name: Provision Pub/Sub
        run: bash deploy/setup-pubsub.sh
        env:
          GCP_PROJECT: ${{ env.GCP_PROJECT_ID }}

      - name: Create GCS buckets
        run: |
          for BUCKET in granicus-pipelines granicus-ops; do
            gsutil ls -b gs://$BUCKET 2>/dev/null \
              && echo "Bucket $BUCKET exists" \
              || gsutil mb -l ${{ env.CLOUD_RUN_REGION }} -p ${{ env.GCP_PROJECT_ID }} gs://$BUCKET
          done

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [build]
    environment: ${{ inputs.environment }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ needs.build.outputs.image_tag }} \
            --region ${{ env.CLOUD_RUN_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --port 8080 \
            --memory 1Gi \
            --cpu 1 \
            --no-allow-unauthenticated \
            --min-instances=0 \
            --max-instances=3 \
            --no-cpu-throttling \
            --cpu-boost \
            --timeout=3600 \
            --set-env-vars "\
              GRANICUS_FIRESTORE_PROJECT=${{ env.GCP_PROJECT_ID }},\
              GRANICUS_PIPELINES_BUCKET=granicus-pipelines,\
              GRANICUS_OPS_BUCKET=granicus-ops,\
              GRANICUS_PIPELINE_SOURCE=gcs,\
              GRANICUS_STATE_BACKEND=firestore,\
              GRANICUS_PUBSUB_PROJECT=${{ env.GCP_PROJECT_ID }},\
              GRANICUS_EVENTS_TOPIC=granicus-events,\
              GRANICUS_RESULT_TOPIC=granicus-results"

      - name: Get service URL
        id: url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.CLOUD_RUN_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --format 'value(status.url)')
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "Deployed to: ${URL}"

      - name: Health check
        run: |
          URL="${{ steps.url.outputs.url }}"
          TOKEN=$(gcloud auth print-identity-token --audiences="${URL}")
          for i in 1 2 3 4 5; do
            echo "Health check attempt ${i}/5..."
            if curl --fail --silent --show-error \
              -H "Authorization: Bearer ${TOKEN}" \
              "${URL}/api/v1/health"; then
              echo ""
              echo "Health check passed."
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after 5 attempts."
          exit 1
