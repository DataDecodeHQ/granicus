# Deploy Granicus engine to Cloud Run via Workload Identity Federation
#
# Infrastructure is managed by Terraform in infra/. This workflow only
# builds the image and updates the Cloud Run revision. Service config
# (env vars, scaling, probes) lives in Terraform -- not here.

name: Deploy Granicus

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - prod
      run_infra:
        description: Run Terraform apply (infra changes)
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'datadecode-platform' }}
  CLOUD_RUN_REGION: ${{ vars.CLOUD_RUN_REGION || 'us-central1' }}
  ARTIFACT_REGISTRY_REPO: ${{ vars.ARTIFACT_REGISTRY_REPO || 'granicus' }}
  ENGINE_SERVICE: granicus-engine

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...

  build:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: |
          REGISTRY="${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}"
          TAG="${REGISTRY}/engine:${{ github.sha }}"
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "Image: ${TAG}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev --quiet

      - name: Build and push
        run: |
          docker build \
            -t ${{ steps.meta.outputs.image_tag }} \
            -t ${{ steps.meta.outputs.registry }}/engine:latest \
            --label "git.sha=${{ github.sha }}" \
            --label "git.ref=${{ github.ref_name }}" \
            .
          docker push ${{ steps.meta.outputs.image_tag }}
          docker push ${{ steps.meta.outputs.registry }}/engine:latest

  infra:
    name: Terraform apply
    runs-on: ubuntu-latest
    needs: [test]
    if: ${{ inputs.run_infra == true }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Plan
        working-directory: infra
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve tfplan

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [build]
    environment: ${{ inputs.environment || 'dev' }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.ENGINE_SERVICE }} \
            --image ${{ needs.build.outputs.image_tag }} \
            --region ${{ env.CLOUD_RUN_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --port 8080 \
            --memory 1Gi \
            --cpu 1 \
            --concurrency 1 \
            --no-allow-unauthenticated \
            --no-cpu-throttling \
            --cpu-boost \
            --min-instances 0 \
            --max-instances 3 \
            --timeout 3600 \
            --set-env-vars "\
              GRANICUS_FIRESTORE_PROJECT=${{ env.GCP_PROJECT_ID }},\
              GRANICUS_PIPELINES_BUCKET=granicus-pipelines,\
              GRANICUS_OPS_BUCKET=granicus-ops,\
              GRANICUS_PIPELINE_SOURCE=gcs,\
              GRANICUS_STATE_BACKEND=firestore"

      - name: Get service URL
        id: url
        run: |
          URL=$(gcloud run services describe ${{ env.ENGINE_SERVICE }} \
            --region ${{ env.CLOUD_RUN_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --format 'value(status.url)')
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "Deployed to: ${URL}"

      - name: Health check
        run: |
          URL="${{ steps.url.outputs.url }}"
          TOKEN=$(gcloud auth print-identity-token --audiences="${URL}")
          for i in 1 2 3 4 5; do
            echo "Health check attempt ${i}/5..."
            if curl --fail --silent --show-error \
              -H "Authorization: Bearer ${TOKEN}" \
              "${URL}/api/v1/health"; then
              echo ""
              echo "Health check passed."
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after 5 attempts."
          exit 1
